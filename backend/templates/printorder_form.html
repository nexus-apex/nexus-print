{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} PrintOrder | NexusPrint{% endblock %}
{% block page_title %}{% if editing %}Edit PrintOrder{% else %}New PrintOrder{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Order Number</label>
        <input type="text" name="order_number" value="{{ record.order_number|default:'' }}">
      </div>
      <div class="form-group">
        <label>Customer Name</label>
        <input type="text" name="customer_name" value="{{ record.customer_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Product Type</label>
        <select name="product_type">
          <option value="business_cards" {% if record.product_type == 'business_cards' %}selected{% endif %}>Business Cards</option>
          <option value="banners" {% if record.product_type == 'banners' %}selected{% endif %}>Banners</option>
          <option value="brochures" {% if record.product_type == 'brochures' %}selected{% endif %}>Brochures</option>
          <option value="flyers" {% if record.product_type == 'flyers' %}selected{% endif %}>Flyers</option>
          <option value="stickers" {% if record.product_type == 'stickers' %}selected{% endif %}>Stickers</option>
          <option value="packaging" {% if record.product_type == 'packaging' %}selected{% endif %}>Packaging</option>
        </select>
      </div>
      <div class="form-group">
        <label>Quantity</label>
        <input type="number" name="quantity" value="{{ record.quantity|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Total</label>
        <input type="number" step="0.01" name="total" value="{{ record.total|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="received" {% if record.status == 'received' %}selected{% endif %}>Received</option>
          <option value="designing" {% if record.status == 'designing' %}selected{% endif %}>Designing</option>
          <option value="printing" {% if record.status == 'printing' %}selected{% endif %}>Printing</option>
          <option value="ready" {% if record.status == 'ready' %}selected{% endif %}>Ready</option>
          <option value="delivered" {% if record.status == 'delivered' %}selected{% endif %}>Delivered</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Due Date</label>
        <input type="date" name="due_date" value="{{ record.due_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} PrintOrder</button>
      <a href="/printorders/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
