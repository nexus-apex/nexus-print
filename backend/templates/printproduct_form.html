{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} PrintProduct | NexusPrint{% endblock %}
{% block page_title %}{% if editing %}Edit PrintProduct{% else %}New PrintProduct{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select name="category">
          <option value="cards" {% if record.category == 'cards' %}selected{% endif %}>Cards</option>
          <option value="large_format" {% if record.category == 'large_format' %}selected{% endif %}>Large Format</option>
          <option value="marketing" {% if record.category == 'marketing' %}selected{% endif %}>Marketing</option>
          <option value="packaging" {% if record.category == 'packaging' %}selected{% endif %}>Packaging</option>
          <option value="custom" {% if record.category == 'custom' %}selected{% endif %}>Custom</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Base Price</label>
        <input type="number" step="0.01" name="base_price" value="{{ record.base_price|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Min Quantity</label>
        <input type="number" name="min_quantity" value="{{ record.min_quantity|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Production Time Days</label>
        <input type="number" name="production_time_days" value="{{ record.production_time_days|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="discontinued" {% if record.status == 'discontinued' %}selected{% endif %}>Discontinued</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} PrintProduct</button>
      <a href="/printproducts/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
